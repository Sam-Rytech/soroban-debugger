name: CI

on:
  push:
    branches: [ main, develop, CI/CD ]
    tags-ignore: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  # Treat *all* compiler warnings as errors across CI (tests/build/bench), including deprecated API usage.
  # This is intentionally stricter than clippy alone; contributors must keep the codebase warning-free.
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --workspace --all-features

  lint:
    name: Lint (Clippy & Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  bench:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to checkout main

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install critcmp
        run: cargo install critcmp --version 0.1.7 || true # Ignore if already in cache

      - name: Run benchmarks (current)
        run: cargo bench -- --save-baseline new --noplot

      - name: Add main branch worktree for baseline
        run: git worktree add /tmp/bench-base main

      - name: Run benchmarks (baseline on main)
        working-directory: /tmp/bench-base
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: cargo bench -- --save-baseline base --noplot

      - name: Remove main branch worktree
        if: always()
        run: git worktree remove --force /tmp/bench-base || true

      - name: Compare benchmarks and check for regressions (>10%)
        shell: bash
        run: |
          set +e
          output="$(critcmp base new --threshold 10 2>&1)"
          status=$?
          set -e

          echo "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if echo "$output" | grep -Fq "no benchmark comparisons to show"; then
            echo "No overlapping benchmark IDs between 'base' and 'new'; skipping regression gate."
            exit 0
          fi

          exit "$status"

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      
      - name: Check coverage threshold
        id: coverage
        run: |
          set -euo pipefail

          # Use JSON output: structured and stable across cargo-llvm-cov versions
          summary_json=$(cargo llvm-cov --workspace --all-features --json --summary-only 2>&1)
          echo "$summary_json"

          # Extract line coverage; || true lets us emit a clear error instead of a raw jq failure
          coverage=$(printf '%s' "$summary_json" | jq -r '.data[0].totals.lines.percent' 2>/dev/null || true)

          if [ -z "$coverage" ] || [ "$coverage" = "null" ]; then
            echo "ERROR: Failed to extract coverage from cargo-llvm-cov JSON output."
            echo "Verify that 'cargo llvm-cov --json --summary-only' still emits .data[0].totals.lines.percent"
            exit 1
          fi

          coverage_pct=$(printf "%.2f" "$coverage")
          echo "Current coverage: ${coverage_pct}%"
          echo "Required threshold: 50%"
          echo "coverage=${coverage_pct}" >> "$GITHUB_OUTPUT"

          meets_threshold=$(awk -v cov="$coverage" -v thresh="50" 'BEGIN {print (cov >= thresh)}')
          if [ "$meets_threshold" = "0" ]; then
            echo "Coverage ${coverage_pct}% is below the required 50% threshold"
            exit 1
          else
            echo "Coverage ${coverage_pct}% meets the required 50% threshold"
          fi
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            ## Code Coverage Report
            
            **Coverage: ${{ steps.coverage.outputs.coverage }}%** (Required: 50%)
            
            View the full coverage report on [Codecov](https://codecov.io/gh/${{ github.repository }}/commit/${{ github.sha }}).
            
            Coverage details are available in the [CI logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).